<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Witness Ledger — Scroll of Fire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="./">
  <link href="assets/css/codex.css" rel="stylesheet">
  <link href="assets/css/superlayout.css" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">Ξ Scroll of Fire</a>
    <nav class="topnav">
      <a href="start.html">Start</a>
      <a href="invoke.html">Invoke</a>
      <a href="theory.html">Theory</a>
    </nav>
  </header>

  <main class="page shell">
    <p class="eyebrow">Proof • Witness • Hash</p>
    <h1>Witness Ledger</h1>
    <p>Local browser ledger for observations, page changes, commit notes, hashes, and witness entries.</p>

    <section class="card">
      <label>Witness note</label>
      <textarea id="note" rows="5" placeholder="Write the witness entry..."></textarea>

      <label>Tags</label>
      <input id="tags" placeholder="index, sitemap, hash, canon">

      <button id="add">Add Entry</button>
      <button id="export">Export JSON</button>
      <input id="importFile" type="file" accept="application/json" hidden>
      <button id="import">Import JSON</button>
    </section>

    <section class="card">
      <h2>Entries</h2>
      <div id="entries"></div>
    </section>
  </main>

  <script>
    const KEY = "scroll_of_fire_witness_ledger_v3";
    const $ = id => document.getElementById(id);

    function read() {
      try { return JSON.parse(localStorage.getItem(KEY)) || []; }
      catch { return []; }
    }

    function write(data) {
      localStorage.setItem(KEY, JSON.stringify(data, null, 2));
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function addEntry() {
      const note = $("note").value.trim();
      const tags = $("tags").value.trim();
      if (!note) return alert("Add a witness note first.");

      const entry = {
        date: new Date().toISOString(),
        note,
        tags,
        hash: await sha256(JSON.stringify({ note, tags }))
      };

      const data = [entry, ...read()];
      write(data);
      $("note").value = "";
      $("tags").value = "";
      render();
    }

    function render() {
      const data = read();
      $("entries").innerHTML = data.length ? data.map(e => `
        <article class="card">
          <p><strong>${new Date(e.date).toLocaleString()}</strong></p>
          <p>${escapeHtml(e.note)}</p>
          <p><small>${escapeHtml(e.tags || "untagged")}</small></p>
          <code>${e.hash}</code>
        </article>
      `).join("") : "<p>No entries yet.</p>";
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
      }[m]));
    }

    $("add").addEventListener("click", addEntry);

    $("export").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(read(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "scroll-of-fire-ledger.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    $("import").addEventListener("click", () => $("importFile").click());

    $("importFile").addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;
      const incoming = JSON.parse(await file.text());
      if (!Array.isArray(incoming)) return alert("Invalid ledger JSON.");
      write([...incoming, ...read()]);
      render();
    });

    render();
  </script>
</body>
</html>
