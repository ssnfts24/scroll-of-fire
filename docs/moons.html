    :root{
      --bg:#090b11;
      --card:#10141d;
      --line:#232938;

      --muted:#a9b2c7;
      --accent:#7af3ff;
      --gold:#f3c97a;
      --radius:18px;
    }

    html,
    body{
      min-height:100%;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font:400 16px/1.55 Inter,system-ui,sans-serif;
      overflow-x:hidden;
    }

    .wrap{
      width:min(100% - 28px, 1120px);
      margin-inline:auto;
      position:relative;
      z-index:1;
      padding:20px 0 48px;
    }

    .card{
      background:rgba(16,20,29,.88);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:0 10px 34px rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
    }

    h1,h2,h3{
      line-height:1.1;
      margin:0 0 .55rem;
    }

    .subtitle{
      color:var(--muted);
      max-width:68ch;
    }

    .btnrow,
    .chiprow,
    .formrow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .lab-btn{
      display:inline-flex;
      align-items:center;
      gap:.45rem;
      padding:.6rem .85rem;
      border-radius:12px;
      border:1px solid var(--line);
      background:#121826;
      color:var(--ink);
      text-decoration:none;
      font-weight:700;
      cursor:pointer;
    }

    .lab-btn.ghost{
      background:transparent;
    }

    .lab-input{
      background:#0f1218;
      color:var(--ink);
      border:1px solid var(--line);
      border-radius:10px;
      padding:.5rem .6rem;
    }

    .grid,
    .row-2{
      display:grid;
      gap:18px;
    }

    .grid{
      grid-template-columns:1fr;
    }

    .row-2{
      grid-template-columns:1fr;
    }

    @media(min-width:900px){
      .row-2{
        grid-template-columns:1fr 1fr;
      }
    }

    .weekrow{
      display:flex;
      align-items:center;
      gap:.7rem;
      overflow:auto;
      white-space:nowrap;
    }

    .week{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:.35rem;
      padding:.45rem .7rem;
      border-radius:999px;
      background:#151b28;
      border:1px solid #293246;
      color:#dfe7ff;
    }

    .meta{
      color:var(--muted);
    }

    .scroller{
      overflow-x:auto;
      width:100%;
    }

    table{

      border-collapse:collapse;
    }

      height:auto;

              id="datePick"
              class="lab-input"
            >
          </label>

          <label>
            Hour
            <input
              type="range"

              max="23"

        </div>

        <div class="btnrow">

      </article>

      <article class="card">

    </section>

    <section class="row-2">

      <article class="card">

          class="gregorian">
        </section>

      </article>

    </section>

    <article class="card">

      <div class="scroller">

        <table class="year-map">

          <thead>

              <th>#</th>
              <th>Moon</th>
              <th>Essence</th>
              <th>Start</th>
              <th>End</th>
            </tr>
          </thead>

          <tbody id="yearMapBody"></tbody>

        </table>

      </div>

    </article>
