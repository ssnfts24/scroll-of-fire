<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Scroll of Fire">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0e1626"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#7af3ff" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#f3c97a" stroke-opacity="0.35" stroke-width="1"/>
  <!-- ䷝-style fire trigram (☲): two solid bars with a broken middle bar -->
  <g fill="#f3c97a">
    <rect x="16" y="20" width="32" height="5" rx="2.5"/>
    <rect x="16" y="38" width="32" height="5" rx="2.5"/>
  </g>
  <g fill="#7af3ff">
    <rect x="16" y="29" width="12" height="5" rx="2.5"/>
    <rect x="36" y="29" width="12" height="5" rx="2.5"/>
  </g>
</svg>
